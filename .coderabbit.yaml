$schema: "https://coderabbit.ai/integrations/schema.v2.json"

language: "en"

tone_instructions: "[MUST]=security·bug·data-loss·PII-exposure, [SHOULD]=quality·performance·missing-tests, [MINOR]=readability·maintainability·style. Do not write comments for NIT-level issues. Approve if no MUST/SHOULD/MINOR. Strictly review PII and civil complaint processing logic."

early_access: true

reviews:
  profile: "assertive"
  request_changes_workflow: false
  high_level_summary: true
  review_status: true
  commit_status: true
  fail_commit_status: true
  abort_on_close: true
  collapse_walkthrough: false
  changed_files_summary: true
  sequence_diagrams: true
  assess_linked_issues: true
  related_issues: true
  related_prs: true
  suggested_labels: true
  auto_apply_labels: false
  suggested_reviewers: true
  auto_assign_reviewers: false
  poem: false

  auto_review:
    enabled: true
    auto_incremental_review: true
    drafts: false
    base_branches:
      - "main"
    ignore_title_keywords:
      - "WIP"
      - "DRAFT"
      - "chore: DORA"
      - "[skip review]"

  path_filters:
    - "!metrics/**"
    - "!site/**"
    - "!**/*.png"
    - "!**/*.jpg"
    - "!**/*.gif"
    - "!**/*.html"
    - "!**/__pycache__/**"
    - "!**/*.pyc"
    - "!models/README.md"

  path_instructions:
    - path: "src/**/*.py"
      instructions: |
        - Check for missing type hints (function parameters and return values)
        - Priority security review: command injection, path traversal, sensitive data logging
        - GovOn is a public administration AI service — strictly review PII (names, addresses, complaint content) handling logic
        - Verify FastAPI endpoints use input validation (Pydantic)
        - Flag missing exception handling or bare except clauses
        - Verify correct usage of async/await patterns

    - path: "src/inference/**/*.py"
      instructions: |
        - LLM inference code: check for memory leaks and GPU OOM risk paths
        - Review LoRA adapter load/unload lifecycle
        - Check for concurrency issues in batch processing
        - Review compatibility with vLLM/HuggingFace API changes

    - path: "src/cli/**/*.py"
      instructions: |
        - Ensure no PII is exposed in terminal output
        - Verify sanitization of user input
        - Review exception safety of streaming response handling

    - path: "training/**/*.py"
      instructions: |
        - Check for hardcoded training data paths (prefer environment variables)
        - Verify atomicity of checkpoint saving logic
        - Review GPU memory management patterns
        - Verify accuracy of evaluation metrics

    - path: "tests/**/*.py"
      instructions: |
        - Flag missing test coverage cases (edge cases, error paths)
        - Flag excessive use of unittest.mock — prefer real integration tests
        - Check reusability of pytest fixtures
        - Verify test isolation (no shared state between tests)
        - Flag missing assert messages

    - path: ".github/workflows/*.yml"
      instructions: |
        - GitHub Actions security: review script injection (direct variable insertion in run)
        - Check for secrets exposure
        - Least privilege principle: review permissions settings
        - Verify external Action version pinning (SHA pinning recommended)

    - path: "configs/**"
      instructions: |
        - No hardcoding of sensitive information (API keys, tokens)
        - Verify environment variable reference patterns

    - path: "scripts/**/*.sh"
      instructions: |
        - Verify ShellCheck rule compliance
        - Check for missing variable quoting
        - Verify error handling (set -e, set -u)

  finishing_touches:
    docstrings:
      enabled: true
    unit_tests:
      enabled: true

knowledge_base:
  opt_out: false
  learnings:
    scope: "auto"
  issues:
    scope: "auto"
  pull_requests:
    scope: "auto"
  code_guidelines:
    enabled: true
  web_search:
    enabled: true

code_generation:
  docstrings:
    language: "en-US"
  unit_tests:
    path_instructions:
      - path: "tests/**/*.py"
        instructions: |
          Use pytest.
          - Define fixtures in conftest.py.
          - For integration tests, prefer real objects; use mocks only for external APIs/GPU.
          - Test function names follow the pattern test_<feature>_<condition>_<expected_result>.
          - Use @pytest.mark.asyncio for async tests.

tools:
  ruff:
    enabled: true
  bandit:
    enabled: true
  shellcheck:
    enabled: true
  yamllint:
    enabled: true
  hadolint:
    enabled: true

chat:
  auto_reply: true
