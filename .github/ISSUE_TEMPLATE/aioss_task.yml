name: "AIOSS Course Assignment"
description: "Use for weekly AI OSS course assignment issues."
title: "[AIOSS-Wxx] "
labels: ["aioss"]
body:
  - type: markdown
    attributes:
      value: |
        > Title format: write the applicable week from `[AIOSS-W01]` to `[AIOSS-W14]`.

  - type: textarea
    id: objective
    attributes:
      label: "Assignment Objective"
      description: "Write the objective of this week's assignment."
      placeholder: "Example: Set up a GitHub-based development environment and write a project proposal."
    validations:
      required: true

  - type: textarea
    id: project_relation
    attributes:
      label: "Project Relevance"
      description: "Explain how this assignment connects to the GovOn project."
      placeholder: |
        - Which feature/structure of the civil complaint system it applies to
        - Technology stack selection rationale, etc.
    validations:
      required: false

  - type: textarea
    id: checklist
    attributes:
      label: "Assignment Checklist"
      description: "Write the items to complete as a checklist."
      value: |
        - [ ]
        - [ ]
        - [ ]
    validations:
      required: true

  - type: textarea
    id: outputs
    attributes:
      label: "Deliverables"
      description: "Write the files/documents to submit or produce as a result of the assignment."
      placeholder: |
        - docs/outputs/...
        - GitHub repository setup complete
    validations:
      required: false
