name: "Bug Report"
description: "Use this to report a bug or unexpected behavior."
title: "[BUG] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: "Bug Description"
      description: "Clearly describe what problem occurred."
      placeholder: "Example: CUDA OOM error when starting vLLM server"
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: "Steps to Reproduce"
      description: "Write the steps to reproduce the bug."
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "Expected Behavior"
      description: "What result should have occurred if working correctly?"
      placeholder: "Example: The model should load successfully and return inference results"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: "Actual Behavior"
      description: "What result actually occurred? Please attach error logs or screenshots."
      placeholder: "Example: RuntimeError: CUDA out of memory..."
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: "Environment"
      description: "Describe the environment where this occurred."
      value: |
        - OS:
        - GPU / VRAM:
        - Python version:
        - Related package versions (vLLM, PyTorch, etc.):
        - Branch:
    validations:
      required: false

  - type: textarea
    id: related
    attributes:
      label: "Related Issues / PRs"
      placeholder: "- #"
    validations:
      required: false
