name: "Documentation / Chore"
description: "Use for documentation, presentation preparation, environment setup, and other miscellaneous tasks."
title: "docs/chore: "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        > Title prefix examples: `docs:` (documentation), `chore:` (environment setup/other)

  - type: textarea
    id: objective
    attributes:
      label: "Objective"
      description: "Briefly describe the purpose of this task."
      placeholder: "Example: Prepare presentation materials for 3/16 meeting"
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: "Tasks"
      description: "Write the tasks to perform as a checklist."
      value: |
        - [ ]
        - [ ]
    validations:
      required: true

  - type: textarea
    id: outputs
    attributes:
      label: "Deliverables"
      description: "Write the resulting files or links."
      placeholder: |
        - docs/presentations/...
        - README.md update
    validations:
      required: false

  - type: textarea
    id: related
    attributes:
      label: "Related Issues / PRs"
      placeholder: "- #"
    validations:
      required: false
