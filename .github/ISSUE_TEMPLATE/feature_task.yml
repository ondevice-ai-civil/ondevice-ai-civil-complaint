name: "Feature Implementation / Milestone Task"
description: "Use for milestone feature implementation, experiments, and improvement tasks."
title: "[Mx] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        > Title format: select the applicable milestone from `[M1]`, `[M2]`, `[M3]`, `[M4]`.

  - type: textarea
    id: background
    attributes:
      label: "Background"
      description: "Describe the background or problem situation that makes this task necessary."
      placeholder: "Example: Data quality issues were identified in the M2 evaluation..."
    validations:
      required: false

  - type: textarea
    id: objective
    attributes:
      label: "Objective"
      description: "Write the goal of this issue in one sentence."
      placeholder: "Example: Fine-tune EXAONE-Deep-7.8B with QLoRA specialized for the civil complaint domain"
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: "Tasks"
      description: "Write the tasks to be performed as a checklist."
      value: |
        - [ ]
        - [ ]
        - [ ]
    validations:
      required: true

  - type: textarea
    id: done_criteria
    attributes:
      label: "Done Criteria"
      description: "Write the criteria for considering this issue complete."
      value: |
        - [ ]
        - [ ]
    validations:
      required: false

  - type: textarea
    id: outputs
    attributes:
      label: "Deliverables"
      description: "Write the files, documents, models, etc. produced as a result of the work."
      placeholder: |
        - src/inference/api_server.py
        - docs/outputs/...
    validations:
      required: false

  - type: textarea
    id: dependencies
    attributes:
      label: "Dependencies"
      description: "Write other issues related to this one."
      placeholder: |
        - #67 QLoRA hyperparameter optimization
        - #68 Response generation quality improvement
    validations:
      required: false

  - type: textarea
    id: related
    attributes:
      label: "Related Issues / PRs"
      description: "Write issue or PR numbers to reference."
      placeholder: |
        - #10, #11
    validations:
      required: false
