name: 'Login to GHCR'
description: 'Authenticate to GitHub Container Registry'
inputs:
  token:
    description: 'GitHub token for GHCR auth'
    required: true
  username:
    description: 'Username for GHCR login'
    required: false
    default: ${{ github.actor }}
runs:
  using: 'composite'
  steps:
    - uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ inputs.username }}
        password: ${{ inputs.token }}
