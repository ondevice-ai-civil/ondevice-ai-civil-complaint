name: 'Login to GHCR'
description: 'Authenticate to GitHub Container Registry'
inputs:
  token:
    description: 'GitHub token for GHCR auth'
    required: true
runs:
  using: 'composite'
  steps:
    - uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.token }}
