name: 'Setup Node.js with Playwright'
description: |
  Install Node.js, npm dependencies, and optionally Playwright browsers with caching.

  The `working-directory` input sets the directory where `npm ci` is run.
  It must contain a valid `package.json` and `package-lock.json`.
  Defaults to the repository root (`$GITHUB_WORKSPACE`).
inputs:
  node-version:
    description: 'Node.js version'
    required: false
    default: '22'
  install-browsers:
    description: 'Install Playwright browsers'
    required: false
    default: 'true'
  working-directory:
    description: 'Directory to run npm ci in (must contain package.json and package-lock.json)'
    required: false
    default: '.'
runs:
  using: 'composite'
  steps:
    - uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'npm'
    - name: Install npm dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: npm ci
    - name: Cache Playwright browsers
      if: inputs.install-browsers == 'true'
      uses: actions/cache@v4
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          playwright-${{ runner.os }}-
    - name: Install Playwright browsers
      if: inputs.install-browsers == 'true' && steps.playwright-cache.outputs.cache-hit != 'true'
      shell: bash
      run: npx playwright install --with-deps chromium
    - name: Install Playwright system deps only (cache hit)
      if: inputs.install-browsers == 'true' && steps.playwright-cache.outputs.cache-hit == 'true'
      shell: bash
      run: npx playwright install-deps chromium
