name: Latency Benchmark

on:
  workflow_dispatch:
    inputs:
      runtime_url:
        description: "HF Space URL (예: https://<space>.hf.space)"
        required: true
        type: string
      runs:
        description: "시나리오당 반복 횟수"
        required: false
        default: "3"
        type: string

jobs:
  benchmark:
    name: Run Latency Benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install httpx

      - name: Run benchmark
        env:
          GOVON_RUNTIME_URL: ${{ inputs.runtime_url }}
          API_KEY: ${{ secrets.GOVON_API_KEY }}
        run: |
          python3 scripts/benchmark_latency.py \
            --runs ${{ inputs.runs }} \
            --output benchmark_results.json \
            | tee benchmark_output.txt

      - name: Write Step Summary
        if: always()
        run: |
          echo "## GovOn Latency Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat benchmark_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            benchmark_results.json
            benchmark_output.txt
          retention-days: 30
