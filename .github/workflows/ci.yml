# CI Workflow for GovOn
#
# Secrets used in this workflow:
#   - CODECOV_TOKEN  : Codecov upload token (used in test job)
#   - DEPLOY_TOKEN   : Deployment authentication token (used in deploy job)

name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'assets/**'
      - 'LICENSE'
      - 'CODE_OF_CONDUCT.md'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'assets/**'
      - 'LICENSE'
      - 'CODE_OF_CONDUCT.md'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ESTIMATED_COLD_INSTALL_SECONDS: 60

permissions:
  contents: read
  pull-requests: write

jobs:
  # ──────────────────────────────────────────────
  # 1. Lint — 코드 스타일 검사 (단일 환경)
  # ──────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Record setup start time
        id: setup-start
        run: echo "time=$(date +%s%N)" >> "$GITHUB_OUTPUT"

      - name: Setup Python with uv
        uses: ./.github/actions/setup-python-uv

      - name: Record setup end time
        id: setup-end
        run: echo "time=$(date +%s%N)" >> "$GITHUB_OUTPUT"

      - name: Check cache status
        id: cache-status
        run: |
          if [ -d "$HOME/.cache/uv" ] && [ "$(ls -A $HOME/.cache/uv 2>/dev/null)" ]; then
            echo "status=hit" >> "$GITHUB_OUTPUT"
          else
            echo "status=miss" >> "$GITHUB_OUTPUT"
          fi

      - name: Record task start time
        id: task-start
        run: echo "time=$(date +%s%N)" >> "$GITHUB_OUTPUT"

      - name: Black (format check)
        id: black
        run: uv run black --check .

      - name: isort (import order check)
        id: isort
        run: uv run isort --check .

      - name: Flake8 (syntax errors only)
        id: flake8
        run: uv run flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=.venv,.git,__pycache__,build,dist

      - name: Record task end time
        id: task-end
        run: echo "time=$(date +%s%N)" >> "$GITHUB_OUTPUT"

      - name: Comment on PR if Lint fails
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const steps_info = ${{ toJSON(steps) }};
            let failedTool = "알 수 없는 단계";
            if (steps_info.black && steps_info.black.outcome === 'failure') failedTool = "Black (포맷팅)";
            else if (steps_info.isort && steps_info.isort.outcome === 'failure') failedTool = "isort (임포트 순서)";
            else if (steps_info.flake8 && steps_info.flake8.outcome === 'failure') failedTool = "Flake8 (코드 스타일)";
            
            const body = `❌ **Lint 단계 실패 요약**
            
            검사 중 다음 도구에서 오류가 발견되었습니다: **${failedTool}**
            
            [상세 로그 확인](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            
            수정 후 다시 푸시해 주세요.`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: body
            });

      - name: Cache Performance Report
        if: always()
        run: |
          setup_start=${{ steps.setup-start.outputs.time }}
          setup_end=${{ steps.setup-end.outputs.time }}
          task_start=${{ steps.task-start.outputs.time }}
          task_end=${{ steps.task-end.outputs.time }}
          cache_status="${{ steps.cache-status.outputs.status }}"
          cold_baseline=${{ env.ESTIMATED_COLD_INSTALL_SECONDS }}

          setup_ns=$((setup_end - setup_start))
          task_ns=$((task_end - task_start))
          total_ns=$((setup_ns + task_ns))

          setup_sec=$(echo "scale=2; $setup_ns / 1000000000" | bc)
          task_sec=$(echo "scale=2; $task_ns / 1000000000" | bc)
          total_sec=$(echo "scale=2; $total_ns / 1000000000" | bc)

          if [ "$cache_status" = "hit" ]; then
            cache_display="✅ HIT"
            improvement=$(echo "scale=2; ($cold_baseline - $setup_sec) / $cold_baseline * 100" | bc)
            savings=$(echo "scale=2; $cold_baseline - $setup_sec" | bc)
            savings_line="| Estimated Savings | ~${savings}s (estimated cold install: ~${cold_baseline}s) |"
            improvement_line="| Improvement Rate | ~${improvement}% |"
          else
            cache_display="❌ MISS"
            savings_line="| Estimated Savings | N/A (cache miss, this run establishes the cache) |"
            improvement_line="| Improvement Rate | N/A (cache miss, this run establishes the cache) |"
          fi

          cat >> $GITHUB_STEP_SUMMARY << EOF
          ### ⏱️ Cache Performance Report — Lint
          | Metric | Value |
          |--------|-------|
          | Cache Status | ${cache_display} |
          | Setup Duration | ${setup_sec}s |
          | Task Duration | ${task_sec}s |
          | Total Duration | ${total_sec}s |
          ${savings_line}
          ${improvement_line}
          EOF

  # ──────────────────────────────────────────────
  # 1.1 Frontend — 프론트엔드 검증 및 빌드
  # ──────────────────────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        id: frontend_install
        run: npm ci
        working-directory: frontend

      - name: Lint frontend
        id: frontend_lint
        run: npm run lint
        working-directory: frontend

      - name: Build frontend
        id: frontend_build
        run: npm run build
        working-directory: frontend

      - name: Comment on PR if Frontend fails
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const steps_info = ${{ toJSON(steps) }};
            let failedStep = "알 수 없는 단계";
            if (steps_info.frontend_install && steps_info.frontend_install.outcome === 'failure') failedStep = "의존성 설치 (npm ci)";
            else if (steps_info.frontend_lint && steps_info.frontend_lint.outcome === 'failure') failedStep = "Lint (eslint)";
            else if (steps_info.frontend_build && steps_info.frontend_build.outcome === 'failure') failedStep = "Build (next build)";
            
            const body = `❌ **Frontend 단계 실패 요약**
            
            프론트엔드 검증/빌드 중 오류가 발생했습니다: **${failedStep}**
            
            [상세 로그 확인](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            
            수정 후 다시 푸시해 주세요.`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: body
            });

  # ──────────────────────────────────────────────
  # 2. Test — 재사용 가능한 워크플로우로 다중 환경 테스트
  # ──────────────────────────────────────────────
  test:
    needs: [lint, frontend]
    uses: ./.github/workflows/reusable-test.yml
    with:
      python-versions: '["3.10", "3.11"]'
      os-list: '["ubuntu-latest", "ubuntu-22.04"]'
      coverage-threshold: 80
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  test-failure-notification:
    needs: [test]
    if: failure() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Comment on PR if Test fails
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = `❌ **Test 단계 실패 요약**
            
            단위 테스트 중 오류가 발견되었습니다.
            
            [상세 로그 확인](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            
            테스트를 통과하도록 코드를 수정한 후 다시 푸시해 주세요.`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: body
            });

  # ──────────────────────────────────────────────
  # 3. Build — 패키지 빌드 및 아티팩트 업로드
  # ──────────────────────────────────────────────
  build:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Record setup start time
        id: setup-start
        run: echo "time=$(date +%s%N)" >> "$GITHUB_OUTPUT"

      - name: Setup Python with uv
        uses: ./.github/actions/setup-python-uv

      - name: Record setup end time
        id: setup-end
        run: echo "time=$(date +%s%N)" >> "$GITHUB_OUTPUT"

      - name: Check cache status
        id: cache-status
        run: |
          if [ -d "$HOME/.cache/uv" ] && [ "$(ls -A $HOME/.cache/uv 2>/dev/null)" ]; then
            echo "status=hit" >> "$GITHUB_OUTPUT"
          else
            echo "status=miss" >> "$GITHUB_OUTPUT"
          fi

      - name: Record task start time
        id: task-start
        run: echo "time=$(date +%s%N)" >> "$GITHUB_OUTPUT"

      - name: Build package
        run: uv build

      - name: Record task end time
        id: task-end
        run: echo "time=$(date +%s%N)" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist-package
          path: dist/
          retention-days: 14

      - name: Build Summary
        run: |
          echo "### Build Artifacts" >> $GITHUB_STEP_SUMMARY
          ls -lh dist/ >> $GITHUB_STEP_SUMMARY

      - name: Cache Performance Report
        if: always()
        run: |
          setup_start=${{ steps.setup-start.outputs.time }}
          setup_end=${{ steps.setup-end.outputs.time }}
          task_start=${{ steps.task-start.outputs.time }}
          task_end=${{ steps.task-end.outputs.time }}
          cache_status="${{ steps.cache-status.outputs.status }}"
          cold_baseline=${{ env.ESTIMATED_COLD_INSTALL_SECONDS }}

          setup_ns=$((setup_end - setup_start))
          task_ns=$((task_end - task_start))
          total_ns=$((setup_ns + task_ns))

          setup_sec=$(echo "scale=2; $setup_ns / 1000000000" | bc)
          task_sec=$(echo "scale=2; $task_ns / 1000000000" | bc)
          total_sec=$(echo "scale=2; $total_ns / 1000000000" | bc)

          if [ "$cache_status" = "hit" ]; then
            cache_display="✅ HIT"
            improvement=$(echo "scale=2; ($cold_baseline - $setup_sec) / $cold_baseline * 100" | bc)
            savings=$(echo "scale=2; $cold_baseline - $setup_sec" | bc)
            savings_line="| Estimated Savings | ~${savings}s (estimated cold install: ~${cold_baseline}s) |"
            improvement_line="| Improvement Rate | ~${improvement}% |"
          else
            cache_display="❌ MISS"
            savings_line="| Estimated Savings | N/A (cache miss, this run establishes the cache) |"
            improvement_line="| Improvement Rate | N/A (cache miss, this run establishes the cache) |"
          fi

          cat >> $GITHUB_STEP_SUMMARY << EOF
          ### ⏱️ Cache Performance Report — Build
          | Metric | Value |
          |--------|-------|
          | Cache Status | ${cache_display} |
          | Setup Duration | ${setup_sec}s |
          | Task Duration | ${task_sec}s |
          | Total Duration | ${total_sec}s |
          ${savings_line}
          ${improvement_line}
          EOF

  # ──────────────────────────────────────────────
  # 4. Deploy — 배포 (main 브랜치에서만 실제 배포)
  # ──────────────────────────────────────────────
  deploy:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-package
          path: dist/

      - name: Verify artifact
        run: |
          echo "### Deploy Artifact Verification" >> $GITHUB_STEP_SUMMARY
          echo "Downloaded artifacts:" >> $GITHUB_STEP_SUMMARY
          ls -lh dist/ | tee -a $GITHUB_STEP_SUMMARY

      - name: Dry-run deploy (PR)
        if: github.event_name == 'pull_request'
        run: |
          echo "=== Dry-run deploy (PR #${{ github.event.number }}) ==="
          echo "Would deploy the following artifacts:"
          ls -lh dist/
          echo "Dry-run complete. No actual deployment performed."

      - name: Deploy to production
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          echo "=== Deploying to production ==="
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          echo "Artifacts:"
          ls -lh dist/
          echo ""
          if [ -n "$DEPLOY_TOKEN" ]; then
            echo "DEPLOY_TOKEN is configured. Proceeding with deployment..."
          else
            echo "WARNING: DEPLOY_TOKEN is not set. Skipping authenticated deployment."
          fi
          echo "Production deployment placeholder complete."
