name: PR Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pr-gate-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      runtime: ${{ steps.filter.outputs.runtime }}
      runtime_contract: ${{ steps.filter.outputs.runtime_contract }}
      packaging: ${{ steps.filter.outputs.packaging }}
      # training/monitoring outputs는 현재 다운스트림 job에서 직접 사용하지 않으나
      # 향후 training pipeline / monitoring alert job 연동을 위해 미리 노출해 둔다.
      training: ${{ steps.filter.outputs.training }}
      monitoring: ${{ steps.filter.outputs.monitoring }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            runtime:
              - 'src/**'
              - 'tests/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/actions/**'
              - '.github/scripts/run_inference_ci.sh'
              - '.github/workflows/ci.yml'
              - '.github/workflows/reusable-test.yml'
            runtime_contract:
              - 'src/inference/**'
              - 'e2e/**'
              - '.github/actions/**'
              - '.github/workflows/ci.yml'
            packaging:
              - 'deploy/docker/Dockerfile'
              - '.dockerignore'
              - 'deploy/compose/docker-compose*.yml'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/workflows/docker-publish.yml'
              - '.github/workflows/offline-package.yml'
              - '.github/workflows/publish-package.yml'
            training:
              - 'training/**'
              - 'data/**'
              - 'configs/**'
            monitoring:
              - 'metrics/**'
              - '.github/workflows/dora-metrics.yml'
              - '.github/workflows/monitor-cloud-run.yml'

      - name: Change summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ### PR Gate Scope
          | Lane | Changed |
          |------|---------|
          | Runtime | \`${{ steps.filter.outputs.runtime }}\` |
          | Runtime contract | \`${{ steps.filter.outputs.runtime_contract }}\` |
          | Docs | \`${{ steps.filter.outputs.docs }}\` |
          | Packaging | \`${{ steps.filter.outputs.packaging }}\` |
          | Training | \`${{ steps.filter.outputs.training }}\` |
          | Monitoring | \`${{ steps.filter.outputs.monitoring }}\` |
          EOF

  lint:
    needs: detect-changes
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.detect-changes.outputs.runtime == 'true' ||
      needs.detect-changes.outputs.packaging == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python with uv
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: '3.12'
          extras: '--extra dev'

      - name: Black
        run: uv run black --check .

      - name: isort
        run: uv run isort --check .

      - name: Flake8
        run: |
          uv run flake8 . \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics \
            --exclude=.venv,.git,__pycache__,build,dist

  test:
    needs: detect-changes
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.detect-changes.outputs.runtime == 'true' ||
      needs.detect-changes.outputs.packaging == 'true'
    uses: ./.github/workflows/reusable-test.yml
    with:
      python-versions: '["3.10", "3.11", "3.12"]'
      os-list: '["ubuntu-latest"]'
      coverage-threshold: 75
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  security:
    needs: detect-changes
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.detect-changes.outputs.runtime == 'true' ||
      needs.detect-changes.outputs.packaging == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python with uv
        uses: ./.github/actions/setup-python-uv
        with:
          extras: '--extra dev'

      - name: Run Bandit on runtime code
        run: uv run bandit -r src/inference -lll -x tests

  runtime-contract:
    needs: [detect-changes, test]
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.detect-changes.outputs.runtime_contract == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true  # SKIP_MODEL_LOAD 환경에서 런타임 기능 제한으로 실패 가능
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python with uv
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: '3.10'
          extras: '--extra dev'

      - name: Install runtime dependencies for contract tests
        run: |
          uv pip install --python .venv/bin/python \
            'fastapi>=0.100.0' \
            'uvicorn>=0.23.0' \
            'rank-bm25>=0.2.2' \
            'faiss-cpu>=1.7.4' \
            'sentence-transformers>=3.0.0'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('e2e/package-lock.json') }}

      - name: Install Node dependencies
        run: npm ci
        working-directory: e2e

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
        working-directory: e2e

      - name: Install Playwright deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
        working-directory: e2e

      - name: Run shell-first runtime contract tests
        env:
          API_KEY: dev-e2e-key
          CI: true
          GOVON_API_KEY: dev-e2e-key
          GOVON_RUNTIME_BASE_URL: http://127.0.0.1:8000
          SERVING_PROFILE: local
          SKIP_MODEL_LOAD: "true"
        run: |
          set -euo pipefail

          mkdir -p test-results playwright-report

          .venv/bin/python -m uvicorn src.inference.api_server:app \
            --host 127.0.0.1 \
            --port 8000 \
            > test-results/runtime-server.log 2>&1 &
          SERVER_PID=$!

          cleanup() {
            if kill -0 "$SERVER_PID" 2>/dev/null; then
              kill "$SERVER_PID" 2>/dev/null || true
              wait "$SERVER_PID" 2>/dev/null || true
            fi
          }
          trap cleanup EXIT

          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/health > /dev/null 2>&1; then
              break
            fi
            sleep 1
          done

          curl -fsS http://127.0.0.1:8000/health > /dev/null
          cd e2e && npx playwright test

      - name: Upload runtime contract artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: runtime-contract-report
          path: |
            test-results/
            playwright-report/
          retention-days: 7

  build:
    needs: [detect-changes, lint, test]
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.detect-changes.outputs.runtime == 'true' ||
      needs.detect-changes.outputs.packaging == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python with uv
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: '3.10'

      - name: Build Python package
        run: uv build

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist-package
          path: dist/
          retention-days: 14
