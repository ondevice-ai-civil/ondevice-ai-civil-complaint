name: Compose Smoke

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  compose-config:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Prepare Compose input directories and env
        run: |
          mkdir -p \
            models/faiss_index \
            models/bm25_index \
            agents \
            configs \
            logs \
            .cache

          printf '%s\n' \
            'API_KEY=offline-ci-key' \
            'BM25_INDEX_HMAC_KEY=offline-ci-hmac-key' \
            'CORS_ORIGINS=http://127.0.0.1:3000' \
            > /tmp/govon-offline.env

          printf '%s\n' \
            'API_KEY=prod-ci-key' \
            > /tmp/govon-prod.env

      - name: Validate Compose configuration
        run: |
          docker compose -f deploy/compose/docker-compose.ci.yml config > /tmp/govon-compose-ci.yaml
          docker compose -f deploy/compose/docker-compose.yml config > /tmp/govon-compose-online.yaml
          docker compose --env-file /tmp/govon-offline.env -f deploy/compose/docker-compose.offline.yml config > /tmp/govon-compose-offline.yaml
          docker compose --env-file /tmp/govon-prod.env -f deploy/compose/docker-compose.prod.yml --profile blue --profile router config > /tmp/govon-compose-prod.yaml

  compose-smoke:
    needs: compose-config
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Prepare Compose input directories
        run: |
          mkdir -p \
            models/faiss_index \
            models/bm25_index \
            agents \
            configs \
            logs \
            .cache

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run Compose runtime smoke test
        env:
          DOCKER_BUILDKIT: 1
          # COMPOSE_DOCKER_CLI_BUILD is unnecessary in Compose V2 — removed
        run: |
          set -euo pipefail

          status=1
          cleanup() {
            if [ "$status" -ne 0 ]; then
              docker compose -f deploy/compose/docker-compose.ci.yml logs --no-color || true
            fi
            docker compose -f deploy/compose/docker-compose.ci.yml down --remove-orphans || true
          }
          trap cleanup EXIT

          docker compose -f deploy/compose/docker-compose.ci.yml up -d --build

          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:18000/health > /tmp/govon-health.json 2>/dev/null; then
              break
            fi
            echo "Waiting for Compose runtime to start... ($i/30)"
            sleep 2
          done

          curl -fsS http://127.0.0.1:18000/health > /tmp/govon-health.json
          python3 -c "import json; d=json.load(open('/tmp/govon-health.json')); assert d['status']=='healthy'; assert d['profile']=='container'"

          bash scripts/smoke-test.sh http://127.0.0.1:18000

          status=0
