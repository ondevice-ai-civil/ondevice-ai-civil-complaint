name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/static/**'
      - 'docs/architecture/*.svg'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Sync architecture SVGs to static site
        run: cp -f docs/architecture/*.svg site/static/ 2>/dev/null || true

      - uses: actions/upload-pages-artifact@v5
        with:
          path: site/static

      - id: deployment
        uses: actions/deploy-pages@v4
