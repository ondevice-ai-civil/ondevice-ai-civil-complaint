name: Docs Portal

on:
  pull_request:
    branches: [main]
    paths:
      - 'site/**'
      - 'docs/**'
      - 'README.md'
      - '.github/workflows/deploy-pages.yml'
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'docs/**'
      - 'README.md'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    permissions:
      contents: read
    uses: ./.github/workflows/reusable-docs-build.yml
    permissions:
      contents: read
    with:
      strict: true
      upload-pages-artifact: true

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
