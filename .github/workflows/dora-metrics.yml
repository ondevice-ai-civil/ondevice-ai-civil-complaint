name: DORA Metrics Collector

on:
  # Auto-collect daily at 09:00 KST (00:00 UTC)
  schedule:
    - cron: '0 0 * * *'
  # Manual trigger
  workflow_dispatch:

permissions:
  contents: write
  issues: read
  pull-requests: read

jobs:
  collect-dora-metrics:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Collect DORA 4 Metrics
        id: dora
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          WEEK_AGO=$(date -u -d '7 days ago' +%Y-%m-%dT%H:%M:%SZ)
          MONTH_AGO=$(date -u -d '30 days ago' +%Y-%m-%dT%H:%M:%SZ)

          echo "=== DORA Metrics Collection: $NOW ==="

          TARGET_BRANCH="main"
          echo ""
          echo "========== [$TARGET_BRANCH] Branch Metrics Collection =========="

          # -------------------------------------------------------
          # 1. Deployment Frequency
          #    Number of PRs merged to main / week
          # -------------------------------------------------------
          DEPLOYS_WEEK=$(gh pr list --repo "$REPO" --state merged --base "$TARGET_BRANCH" \
            --search "merged:>=$WEEK_AGO" --json number --jq 'length' 2>/dev/null || echo "0")
          DEPLOYS_MONTH=$(gh pr list --repo "$REPO" --state merged --base "$TARGET_BRANCH" \
            --search "merged:>=$MONTH_AGO" --json number --jq 'length' 2>/dev/null || echo "0")
          DEPLOYS_PER_WEEK=$(printf "%.2f" "$(echo "scale=2; $DEPLOYS_MONTH / 4" | bc)")
          echo "[$TARGET_BRANCH] Deployment Frequency: weekly $DEPLOYS_WEEK, monthly $DEPLOYS_MONTH (avg per week ${DEPLOYS_PER_WEEK})"

          # -------------------------------------------------------
          # 2. Lead Time for Changes
          #    Average time from first commit to merge
          # -------------------------------------------------------
          LEAD_TIMES=()
          PR_NUMBERS=()

          while IFS= read -r line; do
            PR_NUM=$(echo "$line" | jq -r '.number')
            MERGED=$(echo "$line" | jq -r '.mergedAt')
            CREATED=$(echo "$line" | jq -r '.createdAt')
            if [ "$MERGED" != "null" ] && [ -n "$MERGED" ] && [ -n "$PR_NUM" ]; then
              PR_NUMBERS+=("$PR_NUM")

              FIRST_COMMIT_DATE=""
              FIRST_COMMIT_DATE=$(gh api "repos/${REPO}/pulls/${PR_NUM}/commits" \
                --jq 'sort_by(.commit.author.date) | .[0].commit.author.date' 2>/dev/null || echo "")

              if [ -z "$FIRST_COMMIT_DATE" ] || [ "$FIRST_COMMIT_DATE" = "null" ]; then
                START_DATE="$CREATED"
                echo "  PR #${PR_NUM}: Failed to fetch commit history, falling back to PR creation time"
              else
                START_DATE="$FIRST_COMMIT_DATE"
              fi

              START_TS=$(date -d "$START_DATE" +%s 2>/dev/null || echo "0")
              MERGED_TS=$(date -d "$MERGED" +%s 2>/dev/null || echo "0")
              if [ "$START_TS" -gt 0 ] && [ "$MERGED_TS" -gt 0 ] && [ "$MERGED_TS" -ge "$START_TS" ]; then
                DIFF=$(( MERGED_TS - START_TS ))
                LEAD_TIMES+=($DIFF)
                HOURS=$(printf "%.1f" "$(echo "scale=2; $DIFF / 3600" | bc)")
                echo "  PR #${PR_NUM}: first commit → merge = ${HOURS}h"
              fi
            fi
          done < <(gh pr list --repo "$REPO" --state merged --base "$TARGET_BRANCH" \
            --search "merged:>=$MONTH_AGO" --json number,createdAt,mergedAt --jq '.[]' 2>/dev/null)

          if [ ${#LEAD_TIMES[@]} -gt 0 ]; then
            SUM=0
            for t in "${LEAD_TIMES[@]}"; do SUM=$((SUM + t)); done
            AVG_LEAD_TIME=$((SUM / ${#LEAD_TIMES[@]}))
            AVG_LEAD_HOURS=$(printf "%.1f" "$(echo "scale=2; $AVG_LEAD_TIME / 3600" | bc)")
          else
            AVG_LEAD_TIME=0
            AVG_LEAD_HOURS="0.0"
          fi
          echo "[$TARGET_BRANCH] Lead Time: avg ${AVG_LEAD_HOURS}h (${#LEAD_TIMES[@]} samples, first commit → merge)"

          # -------------------------------------------------------
          # 3. Change Failure Rate
          # -------------------------------------------------------
          TOTAL_COMMITS=$(git log --oneline --since="30 days ago" "origin/${TARGET_BRANCH}" 2>/dev/null | wc -l | tr -d ' ')
          FAILURE_COMMITS=$(git log --oneline --since="30 days ago" "origin/${TARGET_BRANCH}" --grep="fix\|hotfix\|revert\|rollback" -i 2>/dev/null | wc -l | tr -d ' ')
          if [ "$TOTAL_COMMITS" -gt 0 ]; then
            CFR=$(printf "%.1f" "$(echo "scale=2; $FAILURE_COMMITS * 100 / $TOTAL_COMMITS" | bc)")
          else
            CFR="0.0"
          fi
          echo "[$TARGET_BRANCH] Change Failure Rate: ${CFR}% ($FAILURE_COMMITS/$TOTAL_COMMITS)"

          # -------------------------------------------------------
          # 4. Mean Time to Recovery
          #    Average open → close time for bug/hotfix labeled issues
          # -------------------------------------------------------
          MTTR_TIMES=()
          while IFS= read -r line; do
            CREATED=$(echo "$line" | jq -r '.createdAt')
            CLOSED=$(echo "$line" | jq -r '.closedAt')
            if [ "$CLOSED" != "null" ] && [ -n "$CLOSED" ]; then
              CREATED_TS=$(date -d "$CREATED" +%s 2>/dev/null || echo "0")
              CLOSED_TS=$(date -d "$CLOSED" +%s 2>/dev/null || echo "0")
              if [ "$CREATED_TS" -gt 0 ] && [ "$CLOSED_TS" -gt 0 ]; then
                DIFF=$(( CLOSED_TS - CREATED_TS ))
                MTTR_TIMES+=($DIFF)
              fi
            fi
          done < <(gh issue list --repo "$REPO" --state closed --label "bug" \
            --search "closed:>=$MONTH_AGO" --json createdAt,closedAt --jq '.[]' 2>/dev/null)

          if [ ${#MTTR_TIMES[@]} -gt 0 ]; then
            SUM=0
            for t in "${MTTR_TIMES[@]}"; do SUM=$((SUM + t)); done
            AVG_MTTR=$((SUM / ${#MTTR_TIMES[@]}))
            AVG_MTTR_HOURS=$(printf "%.1f" "$(echo "scale=2; $AVG_MTTR / 3600" | bc)")
          else
            AVG_MTTR=0
            AVG_MTTR_HOURS="0.0"
          fi
          echo "[$TARGET_BRANCH] Mean Time to Recovery: ${AVG_MTTR_HOURS}h (${#MTTR_TIMES[@]} samples)"

          # -------------------------------------------------------
          # DORA Grade (based on main branch)
          # -------------------------------------------------------
          LEAD_TIME=$AVG_LEAD_HOURS
          if [ "$(echo "$DEPLOYS_PER_WEEK >= 1" | bc)" -eq 1 ] && \
             [ "$(echo "$LEAD_TIME < 24" | bc)" -eq 1 ]; then
            GRADE="Elite"
          elif [ "$(echo "$DEPLOYS_PER_WEEK >= 0.5" | bc)" -eq 1 ]; then
            GRADE="High"
          elif [ "$DEPLOYS_MONTH" -gt 0 ]; then
            GRADE="Medium"
          else
            GRADE="Low"
          fi

          echo ""
          echo "========== DORA Grade: $GRADE (based on main) =========="

          # -------------------------------------------------------
          # Save JSON artifact
          # -------------------------------------------------------
          mkdir -p metrics/dora
          FILENAME="metrics/dora/dora-$(date -u +%Y%m%d).json"
          LEAD_TIMES_COUNT=${#LEAD_TIMES[@]}
          MTTR_TIMES_COUNT=${#MTTR_TIMES[@]}
          DORA_NOW="$NOW" DORA_GRADE="$GRADE" DORA_FILENAME="$FILENAME" \
          DORA_DEPLOYS_WEEK="$DEPLOYS_WEEK" DORA_DEPLOYS_MONTH="$DEPLOYS_MONTH" \
          DORA_DEPLOYS_PER_WEEK="$DEPLOYS_PER_WEEK" \
          DORA_AVG_LEAD_TIME="$AVG_LEAD_TIME" DORA_AVG_LEAD_HOURS="$AVG_LEAD_HOURS" \
          DORA_LEAD_TIMES_COUNT="$LEAD_TIMES_COUNT" \
          DORA_CFR="$CFR" DORA_FAILURE_COMMITS="$FAILURE_COMMITS" \
          DORA_TOTAL_COMMITS="$TOTAL_COMMITS" \
          DORA_AVG_MTTR="$AVG_MTTR" DORA_AVG_MTTR_HOURS="$AVG_MTTR_HOURS" \
          DORA_MTTR_TIMES_COUNT="$MTTR_TIMES_COUNT" \
          python3 - << 'PYEOF'
          import json, os
          e = os.environ
          data = {
            "timestamp": e["DORA_NOW"],
            "period": "last_30_days",
            "grade": e["DORA_GRADE"],
            "primary_branch": "main",
            "main": {
              "deployment_frequency": {
                "weekly": int(e["DORA_DEPLOYS_WEEK"]),
                "monthly": int(e["DORA_DEPLOYS_MONTH"]),
                "avg_per_week": float(e["DORA_DEPLOYS_PER_WEEK"])
              },
              "lead_time_for_changes": {
                "method": "first_commit_to_merge",
                "avg_seconds": int(e["DORA_AVG_LEAD_TIME"]),
                "avg_hours": float(e["DORA_AVG_LEAD_HOURS"]),
                "sample_count": int(e["DORA_LEAD_TIMES_COUNT"])
              },
              "change_failure_rate": {
                "rate_percent": float(e["DORA_CFR"]),
                "failure_commits": int(e["DORA_FAILURE_COMMITS"]),
                "total_commits": int(e["DORA_TOTAL_COMMITS"])
              },
              "mean_time_to_recovery": {
                "avg_seconds": int(e["DORA_AVG_MTTR"]),
                "avg_hours": float(e["DORA_AVG_MTTR_HOURS"]),
                "sample_count": int(e["DORA_MTTR_TIMES_COUNT"])
              }
            }
          }
          filename = e["DORA_FILENAME"]
          with open(filename, "w") as f:
            json.dump(data, f, indent=2, ensure_ascii=False)
          print(f"JSON saved: {filename}")
          PYEOF

          # GitHub Actions output
          {
            echo "deploys_week=$DEPLOYS_WEEK"
            echo "deploys_month=$DEPLOYS_MONTH"
            echo "lead_time_hours=$AVG_LEAD_HOURS"
            echo "lead_time_method=first_commit_to_merge"
            echo "cfr=$CFR"
            echo "mttr_hours=$AVG_MTTR_HOURS"
            echo "grade=$GRADE"
            echo "filename=$FILENAME"
          } >> $GITHUB_OUTPUT

      - name: Generate Step Summary
        env:
          DEPLOYS_WEEK: ${{ steps.dora.outputs.deploys_week }}
          DEPLOYS_MONTH: ${{ steps.dora.outputs.deploys_month }}
          LEAD_TIME: ${{ steps.dora.outputs.lead_time_hours }}
          LEAD_METHOD: ${{ steps.dora.outputs.lead_time_method }}
          CFR: ${{ steps.dora.outputs.cfr }}
          MTTR: ${{ steps.dora.outputs.mttr_hours }}
          GRADE: ${{ steps.dora.outputs.grade }}
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## DORA Metrics Report

          ### main Branch
          | Metric | Value | Grade Criteria |
          |--------|-------|----------------|
          | **Deployment Frequency** | ${DEPLOYS_WEEK}/week / ${DEPLOYS_MONTH}/month | Elite: 1+ per day |
          | **Lead Time** | ${LEAD_TIME}h (${LEAD_METHOD}) | Elite: < 1 day |
          | **Change Failure Rate** | ${CFR}% | Elite: < 15% |
          | **Mean Time to Recovery** | ${MTTR}h | Elite: < 1 hour |

          **Overall Grade: ${GRADE}**

          > Lead time measurement: first commit of PR → merge time (reflects actual development start)
          EOF

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install report dependencies
        run: python3 -m pip install matplotlib

      - name: Generate Weekly Report
        run: python3 metrics/scripts/generate_report.py

      - name: Update README DORA badges
        env:
          DEPLOYS_WEEK: ${{ steps.dora.outputs.deploys_week }}
          LEAD_TIME: ${{ steps.dora.outputs.lead_time_hours }}
          CFR: ${{ steps.dora.outputs.cfr }}
          MTTR: ${{ steps.dora.outputs.mttr_hours }}
          GRADE: ${{ steps.dora.outputs.grade }}
        run: |
          case "$GRADE" in
            Elite)  COLOR="brightgreen" ;;
            High)   COLOR="blue" ;;
            Medium) COLOR="yellow" ;;
            *)      COLOR="red" ;;
          esac

          LT_COLOR="brightgreen"
          if [ "$(echo "$LEAD_TIME > 168" | bc)" -eq 1 ]; then LT_COLOR="red"
          elif [ "$(echo "$LEAD_TIME > 24" | bc)" -eq 1 ]; then LT_COLOR="yellow"; fi

          CFR_COLOR="brightgreen"
          if [ "$(echo "$CFR > 45" | bc)" -eq 1 ]; then CFR_COLOR="red"
          elif [ "$(echo "$CFR > 15" | bc)" -eq 1 ]; then CFR_COLOR="yellow"; fi

          MTTR_COLOR="brightgreen"
          if [ "$(echo "$MTTR > 24" | bc)" -eq 1 ]; then MTTR_COLOR="red"
          elif [ "$(echo "$MTTR > 1" | bc)" -eq 1 ]; then MTTR_COLOR="yellow"; fi

          encode() { python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"; }

          BADGES="![DORA Grade](https://img.shields.io/badge/DORA-$(encode "$GRADE")-${COLOR})"
          BADGES="${BADGES}\n![Deploy Freq](https://img.shields.io/badge/Deploy_Freq-$(encode "${DEPLOYS_WEEK}/week")-blue)"
          BADGES="${BADGES}\n![Lead Time](https://img.shields.io/badge/Lead_Time-$(encode "${LEAD_TIME}h")-${LT_COLOR})"
          BADGES="${BADGES}\n![CFR](https://img.shields.io/badge/CFR-$(encode "${CFR}%25")-${CFR_COLOR})"
          BADGES="${BADGES}\n![MTTR](https://img.shields.io/badge/MTTR-$(encode "${MTTR}h")-${MTTR_COLOR})"

          DORA_BADGES="$BADGES" python3 - << 'PYEOF'
          import re, os
          with open("README.md", "r") as f:
              content = f.read()
          badges = os.environ["DORA_BADGES"]
          pattern = r"<!-- DORA-BADGES:START -->.*?<!-- DORA-BADGES:END -->"
          replacement = f"<!-- DORA-BADGES:START -->\n{badges}\n<!-- DORA-BADGES:END -->"
          content = re.sub(pattern, replacement, content, flags=re.DOTALL)
          with open("README.md", "w") as f:
              f.write(content)
          print("README DORA badges updated")
          PYEOF

      - name: Commit metrics, reports and README to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add metrics/dora/ metrics/reports/ metrics/grafana-cloud/ README.md
          git diff --staged --quiet || git commit -m "chore: DORA metrics collection, report generation and badge update $(date -u +%Y-%m-%d) [skip ci]"
          git push origin main || echo "No changes to push"

      - name: Push to Grafana Cloud
        if: env.GRAFANA_CLOUD_URL != ''
        env:
          GRAFANA_CLOUD_URL: ${{ secrets.GRAFANA_CLOUD_URL }}
          GRAFANA_CLOUD_USER: ${{ secrets.GRAFANA_CLOUD_USER }}
          GRAFANA_CLOUD_API_KEY: ${{ secrets.GRAFANA_CLOUD_API_KEY }}
          DEPLOYS_WEEK: ${{ steps.dora.outputs.deploys_week }}
          DEPLOYS_MONTH: ${{ steps.dora.outputs.deploys_month }}
          LEAD_TIME: ${{ steps.dora.outputs.lead_time_hours }}
          CFR: ${{ steps.dora.outputs.cfr }}
          MTTR: ${{ steps.dora.outputs.mttr_hours }}
          GRADE: ${{ steps.dora.outputs.grade }}
        run: |
          INFLUX_URL="${GRAFANA_CLOUD_URL/api\/prom\/push/api/v1/push/influx/write}"

          case "$GRADE" in
            Elite) GRADE_NUM=4 ;;
            High)  GRADE_NUM=3 ;;
            Medium) GRADE_NUM=2 ;;
            *)     GRADE_NUM=1 ;;
          esac

          # Prevent Prometheus staleness: backfill same values at 5-minute intervals for past 7 days
          GRAFANA_INFLUX_URL="$INFLUX_URL" \
          GRAFANA_USER="$GRAFANA_CLOUD_USER" \
          GRAFANA_TOKEN="$GRAFANA_CLOUD_API_KEY" \
          DORA_DEPLOYS_WEEK="$DEPLOYS_WEEK" \
          DORA_DEPLOYS_MONTH="$DEPLOYS_MONTH" \
          DORA_LEAD_TIME="$LEAD_TIME" \
          DORA_CFR="$CFR" \
          DORA_MTTR="$MTTR" \
          DORA_GRADE_NUM="$GRADE_NUM" \
          python3 - << 'PYEOF'
          import subprocess, time, os, base64

          e = os.environ
          METRICS = {
              "dora_deployment_frequency,project=govon,branch=main,period=weekly": float(e["DORA_DEPLOYS_WEEK"]),
              "dora_deployment_frequency,project=govon,branch=main,period=monthly": float(e["DORA_DEPLOYS_MONTH"]),
              "dora_lead_time_hours,project=govon,branch=main": float(e["DORA_LEAD_TIME"]),
              "dora_change_failure_rate,project=govon,branch=main": float(e["DORA_CFR"]),
              "dora_mttr_hours,project=govon,branch=main": float(e["DORA_MTTR"]),
              "dora_grade,project=govon,branch=main": float(e["DORA_GRADE_NUM"]),
          }

          URL = e["GRAFANA_INFLUX_URL"]
          token = base64.b64encode(f"{e['GRAFANA_USER']}:{e['GRAFANA_TOKEN']}".encode()).decode()
          auth_header = f"Basic {token}"

          NOW = int(time.time())
          INTERVAL = 300
          DURATION = 7 * 24 * 3600
          START = NOW - DURATION
          POINTS = DURATION // INTERVAL
          print(f"Pushing {POINTS} data points (7d backfill, 5min intervals) for main...")

          batch_size = 500
          lines = []
          sent = 0

          for i in range(POINTS + 1):
              ts = (START + i * INTERVAL) * 1_000_000_000
              for metric, value in METRICS.items():
                  lines.append(f"{metric} value={value} {ts}")

              if len(lines) >= batch_size * len(METRICS):
                  tmp = "/tmp/metrics_batch.txt"
                  with open(tmp, "w") as f:
                      f.write("\n".join(lines))
                  subprocess.run(
                      ["curl", "-s", "-o", "/dev/null",
                       "-X", "POST", URL,
                       "-H", f"Authorization: {auth_header}",
                       "-H", "Content-Type: text/plain",
                       "--data-binary", f"@{tmp}"],
                      capture_output=True
                  )
                  sent += len(lines) // len(METRICS)
                  lines = []

          if lines:
              tmp = "/tmp/metrics_batch.txt"
              with open(tmp, "w") as f:
                  f.write("\n".join(lines))
              result = subprocess.run(
                  ["curl", "-s", "-o", "/dev/null", "-w", "%{http_code}",
                   "-X", "POST", URL,
                   "-H", f"Authorization: {auth_header}",
                   "-H", "Content-Type: text/plain",
                   "--data-binary", f"@{tmp}"],
                  capture_output=True, text=True
              )
              sent += len(lines) // len(METRICS)
              code = result.stdout.strip()
          else:
              code = "204"

          print(f"Grafana Cloud metrics push complete ({sent} points, HTTP {code})")
          PYEOF

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: dora-metrics-${{ github.run_number }}
          path: |
            metrics/dora/
            metrics/reports/
          retention-days: 90
