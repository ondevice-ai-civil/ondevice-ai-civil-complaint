name: Homebrew Formula Auto-Update

# Production-grade Homebrew update:
# Pushes the formula directly to the separate tap repository
# (GovOn-Org/homebrew-govon) which has no branch protection.
# This is the standard pattern used by Bun, Claude Code, etc.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: "GovOn version (e.g. 1.5.1)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  update-tap:
    name: Update Homebrew Tap
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        id: resolve
        env:
          INPUT_VERSION: ${{ inputs.version || '' }}
          REF_NAME: ${{ github.ref_name || '' }}
        run: |
          VERSION="${INPUT_VERSION:-${REF_NAME#v}}"
          if [ -z "$VERSION" ]; then
            echo "::error::Could not determine version"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Wait for npm publish
        env:
          VERSION: ${{ steps.resolve.outputs.version }}
        run: |
          echo "Waiting for govon@${VERSION} on npm..."
          for i in $(seq 1 30); do
            NPM_VERSION=$(npm view govon version 2>/dev/null || echo "")
            if [ "$NPM_VERSION" = "$VERSION" ]; then
              echo "govon@${VERSION} found on npm (attempt $i)"
              exit 0
            fi
            echo "  Attempt $i: npm has $NPM_VERSION, waiting 10s..."
            sleep 10
          done
          echo "::error::govon@${VERSION} not found on npm after 5 minutes"
          exit 1

      - name: Generate formula
        id: formula
        env:
          VERSION: ${{ steps.resolve.outputs.version }}
        run: |
          # Fetch npm tarball SHA256
          TARBALL_URL="https://registry.npmjs.org/govon/-/govon-${VERSION}.tgz"
          echo "Downloading tarball for SHA256: $TARBALL_URL"
          SHA256=$(curl -fsSL "$TARBALL_URL" | shasum -a 256 | awk '{print $1}')
          echo "SHA256: $SHA256"

          cat > /tmp/govon.rb <<EOF
          # typed: false
          # frozen_string_literal: true

          class Govon < Formula
            desc "Agentic TUI for Korean public-sector civil complaint workflows"
            homepage "https://github.com/GovOn-Org/GovOn"
            url "https://registry.npmjs.org/govon/-/govon-${VERSION}.tgz"
            sha256 "${SHA256}"
            license "MIT"

            depends_on "node@22"

            def install
              system "npm", "install", *std_npm_args
              bin.install_symlink libexec.glob("bin/*")
            end

            test do
              assert_match version.to_s, shell_output("\#{bin}/govon --version")
            end
          end
          EOF
          # Remove leading whitespace from heredoc
          sed -i 's/^          //' /tmp/govon.rb

          echo "=== Generated formula ==="
          cat /tmp/govon.rb

      - name: Push to homebrew-govon tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.resolve.outputs.version }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/GovOn-Org/homebrew-govon.git" /tmp/tap
          cp /tmp/govon.rb /tmp/tap/Formula/govon.rb

          cd /tmp/tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Formula/govon.rb
          if git diff --cached --quiet; then
            echo "No formula changes"
            exit 0
          fi

          git commit -m "govon ${VERSION}"
          git push origin main
          echo "Homebrew tap updated to ${VERSION}"

      - name: Update local formula copy
        env:
          VERSION: ${{ steps.resolve.outputs.version }}
        run: |
          echo "Local homebrew/govon.rb in main repo is a reference copy."
          echo "Tap repo (GovOn-Org/homebrew-govon) is the source of truth."
          echo "govon ${VERSION} published to tap."
