name: Homebrew Formula Auto-Update

on:
  # Auto-trigger on version tag push
  push:
    tags: ['v*']

  # Manual trigger
  workflow_dispatch:
    inputs:
      version:
        description: "GovOn version (e.g. 1.4.9)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  update-formula:
    name: Update Homebrew Formula
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve version
        id: resolve
        env:
          INPUT_VERSION: ${{ inputs.version || '' }}
          REF_NAME: ${{ github.ref_name || '' }}
        run: |
          VERSION="${INPUT_VERSION:-${REF_NAME#v}}"
          if [ -z "$VERSION" ]; then
            echo "::error::Could not determine version"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

          # Fetch npm tarball URL
          NPM_URL="https://registry.npmjs.org/govon/-/govon-${VERSION}.tgz"
          echo "npm_url=$NPM_URL" >> "$GITHUB_OUTPUT"
          echo "URL: $NPM_URL"

      - name: Update formula
        env:
          VERSION: ${{ steps.resolve.outputs.version }}
          NPM_URL: ${{ steps.resolve.outputs.npm_url }}
        run: |
          python3 << 'PYEOF'
          import os, re

          formula_path = "homebrew/govon.rb"
          version = os.environ["VERSION"]
          npm_url = os.environ["NPM_URL"]

          with open(formula_path, "r") as f:
              content = f.read()

          # Replace url line
          content = re.sub(
              r'url ".*?"',
              f'url "{npm_url}"',
              content,
              count=1,
          )

          with open(formula_path, "w") as f:
              f.write(content)

          print("=== Updated formula ===")
          with open(formula_path, "r") as f:
              for i, line in enumerate(f):
                  if i >= 12:
                      break
                  print(line, end="")
          PYEOF

      - name: Create PR and auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.resolve.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add homebrew/govon.rb
          if git diff --cached --quiet; then
            echo "No formula changes to commit"
            exit 0
          fi

          BRANCH="chore/homebrew-${VERSION}"
          git checkout -b "$BRANCH"
          git commit -m "chore: update homebrew formula to ${VERSION}"
          git push -u origin "$BRANCH"

          PR_URL=$(gh pr create \
            --title "chore: update homebrew formula to ${VERSION}" \
            --body "Auto-generated by Homebrew Formula Auto-Update workflow." \
            --head "$BRANCH" \
            --base main)

          echo "PR created: $PR_URL"
          gh pr merge "$PR_URL" --admin --squash --delete-branch
          echo "Homebrew formula updated to ${VERSION} via PR"
