name: Homebrew Formula Auto-Update

on:
  # Auto-trigger after PyPI deployment completes
  workflow_run:
    workflows: ["Publish to PyPI"]
    types: [completed]

  # Manual trigger
  workflow_dispatch:
    inputs:
      version:
        description: "GovOn version (e.g. 1.0.6)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  update-formula:
    name: Update Homebrew Formula
    runs-on: ubuntu-latest
    # workflow_run: only when PyPI deployment succeeds + tag push
    # workflow_dispatch: always runs
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Resolve version and sha256 from PyPI
        id: resolve
        env:
          INPUT_VERSION: ${{ inputs.version || '' }}
          TRIGGER_BRANCH: ${{ github.event.workflow_run.head_branch || '' }}
        run: |
          pip install requests --quiet

          python3 << 'PYEOF'
          import json, os, re, sys
          import requests

          input_version = os.environ.get("INPUT_VERSION", "").strip()
          trigger_branch = os.environ.get("TRIGGER_BRANCH", "").strip()

          # Determine version: input > trigger branch tag > PyPI latest
          version = None
          if input_version:
              version = input_version.lstrip("v")
          elif trigger_branch.startswith("v"):
              version = trigger_branch.lstrip("v")

          # Fetch from PyPI
          resp = requests.get("https://pypi.org/pypi/govon/json", timeout=30)
          resp.raise_for_status()
          data = resp.json()

          if not version:
              version = data["info"]["version"]

          if version not in data["releases"]:
              print(f"::error::Version {version} not found on PyPI")
              sys.exit(1)

          releases = data["releases"][version]
          sdist = next((r for r in releases if r["packagetype"] == "sdist"), None)
          if not sdist:
              print(f"::error::No sdist found for version {version}")
              sys.exit(1)

          url = sdist["url"]
          sha256 = sdist["digests"]["sha256"]

          # Validate
          if not re.match(r"^[0-9]+\.[0-9]+\.[0-9]+", version):
              print(f"::error::Invalid version: {version}")
              sys.exit(1)
          if not re.match(r"^[a-f0-9]{64}$", sha256):
              print(f"::error::Invalid sha256: {sha256}")
              sys.exit(1)

          print(f"Version: {version}")
          print(f"URL: {url}")
          print(f"SHA256: {sha256}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"version={version}\n")
              f.write(f"sha256={sha256}\n")
              f.write(f"pypi_url={url}\n")
          PYEOF

      - name: Update formula
        env:
          VERSION: ${{ steps.resolve.outputs.version }}
          SHA256: ${{ steps.resolve.outputs.sha256 }}
          PYPI_URL: ${{ steps.resolve.outputs.pypi_url }}
        run: |
          FORMULA="homebrew/govon.rb"

          # Update url (first url line = main package)
          sed -i "0,|url \".*\"|s|url \".*\"|url \"${PYPI_URL}\"|" "$FORMULA"

          # Update sha256 (first sha256 line = main package)
          sed -i "0,/sha256 \".*\"/s/sha256 \".*\"/sha256 \"${SHA256}\"/" "$FORMULA"

          echo "=== Updated formula ==="
          head -15 "$FORMULA"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update homebrew formula to ${{ steps.resolve.outputs.version }}"
          branch: "chore/homebrew-${{ steps.resolve.outputs.version }}"
          delete-branch: true
          title: "chore: Homebrew formula v${{ steps.resolve.outputs.version }}"
          body: |
            Automated update after PyPI release.

            - Version: `${{ steps.resolve.outputs.version }}`
            - SHA256: `${{ steps.resolve.outputs.sha256 }}`
            - Source: `${{ steps.resolve.outputs.pypi_url }}`
          labels: |
            chore
            automated
