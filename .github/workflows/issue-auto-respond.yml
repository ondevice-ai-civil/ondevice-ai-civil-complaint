name: Issue Auto Response

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  auto-respond:
    runs-on: ubuntu-latest
    if: github.event.issue.user.type != 'Bot'
    steps:
      - name: Auto-label by issue content
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const body = issue.body || '';
            const title = issue.title || '';
            const labels = [];

            if (body.includes('Bug Report') || /^\[BUG\]/i.test(title)) {
              labels.push('bug', 'triage');
            } else if (body.includes('Feature Request') || /^\[FEAT\]/i.test(title)) {
              labels.push('enhancement', 'triage');
            } else if (body.includes('Documentation') || /^\[DOCS\]/i.test(title)) {
              labels.push('documentation');
            }

            if (/urgent|critical|blocker/i.test(title + body)) {
              labels.push('priority:high');
            }

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: labels,
              });
            }

      - name: Post welcome comment
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            if (issue.user.type === 'Bot') return;

            const body = [
              `@${issue.user.login} Thank you for opening an issue.`,
              '',
              'A maintainer will review and respond shortly.',
              '',
              '**Reference Docs:**',
              '- [Getting Started (Wiki)](https://github.com/umyunsang/GovOn/wiki/Getting-Started)',
              '- [Troubleshooting (Wiki)](https://github.com/umyunsang/GovOn/wiki/Troubleshooting)',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: body,
            });
