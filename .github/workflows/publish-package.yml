name: Publish Package

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: publish-package-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python with uv
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: '3.10'

      - name: Extract version from tag
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "### Package Version: $VERSION" >> $GITHUB_STEP_SUMMARY

      - name: Verify version consistency
        run: |
          TAG_VERSION="${{ steps.version.outputs.version }}"
          TOML_VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [[ "${{ github.ref_type }}" == "tag" && "$TAG_VERSION" != "$TOML_VERSION" ]]; then
            echo "::error::Tag version ($TAG_VERSION) does not match pyproject.toml version ($TOML_VERSION)"
            exit 1
          fi
          echo "Version check passed: $TOML_VERSION"

      - name: Build package
        run: |
          uv build
          echo "### Built Artifacts" >> $GITHUB_STEP_SUMMARY
          ls -lh dist/ >> $GITHUB_STEP_SUMMARY

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: python-package-${{ steps.version.outputs.version }}
          path: dist/
          retention-days: 30

      - name: Publish to GitHub Packages
        if: github.ref_type == 'tag'
        run: |
          uv publish \
            --publish-url https://ghcr.io/api/packages/${{ github.repository_owner }}/pypi/upload \
            --token ${{ secrets.GITHUB_TOKEN }} \
            dist/* || echo "::warning::GitHub Packages PyPI publish failed, continuing..."

      - name: Wait for GitHub Release to be created
        if: github.ref_type == 'tag'
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "Waiting for release ${TAG} to be created by release.yml..."
          for i in $(seq 1 30); do
            if gh release view "$TAG" > /dev/null 2>&1; then
              echo "Release ${TAG} found."
              exit 0
            fi
            echo "Attempt ${i}/30: release not ready, waiting 10s..."
            sleep 10
          done
          echo "::error::Timed out waiting for release ${TAG}"
          exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attach artifacts to GitHub Release
        if: github.ref_type == 'tag'
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release upload "$TAG" dist/* --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Summary
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Publish Results" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Package Build | Done |" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact Upload | Done |" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "| Release Artifacts | Attached |" >> $GITHUB_STEP_SUMMARY
            echo "| GitHub Packages | Done |" >> $GITHUB_STEP_SUMMARY
            echo "| Release Notes | Handled by release.yml workflow |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Release Artifacts | Skipped (manual trigger) |" >> $GITHUB_STEP_SUMMARY
            echo "| GitHub Packages | Skipped (manual trigger) |" >> $GITHUB_STEP_SUMMARY
          fi
