name: Publish to PyPI

on:
  push:
    tags: ['v*']

concurrency:
  group: publish-pypi-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  # Step 1: Build lightweight Python wheel (launcher only, no SEA binaries)
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install build tools
        run: pip install build

      - name: Extract version from tag
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify version consistency
        env:
          TAG_VERSION: ${{ steps.version.outputs.version }}
        run: |
          TOML_VERSION=$(python3 -c "
          try:
              import tomllib
          except ModuleNotFoundError:
              import pip._vendor.tomli as tomllib
          print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])
          ")
          if [[ "$TAG_VERSION" != "$TOML_VERSION" ]]; then
            echo "::error::Tag version ($TAG_VERSION) does not match pyproject.toml version ($TOML_VERSION)"
            exit 1
          fi
          echo "Version check passed: $TOML_VERSION"

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: dist/

  # Step 2: Publish lightweight wheel to PyPI
  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/govon
    permissions:
      id-token: write  # OIDC Trusted Publisher
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # Step 3: Build SEA binaries and attach to GitHub Release
  build-sea:
    name: Build & attach SEA binaries
    needs: publish-pypi
    uses: ./.github/workflows/build-sea.yml
    with:
      version: ${{ github.ref_name }}
    permissions:
      contents: read

  attach-sea:
    name: Attach SEA to Release
    needs: build-sea
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to upload release assets
    steps:
      - name: Download SEA binaries
        uses: actions/download-artifact@v4
        with:
          path: sea-binaries/
          pattern: govon-*
          merge-multiple: true

      - name: List binaries
        run: ls -lh sea-binaries/

      - name: Attach to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          for binary in sea-binaries/govon-*; do
            echo "Uploading $(basename $binary) to release $TAG..."
            gh release upload "$TAG" "$binary" --repo "$GITHUB_REPOSITORY" --clobber || true
          done
