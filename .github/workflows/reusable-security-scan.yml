name: Reusable Security Scan

on:
  workflow_call:
    inputs:
      bandit-target:
        type: string
        default: 'src'
      bandit-severity:
        type: string
        default: '-lll'
      pip-audit-enabled:
        type: boolean
        default: true
      upload-sarif:
        type: boolean
        default: false
      create-issue-on-vuln:
        type: boolean
        default: false
    secrets:
      github-token:
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      issues: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Cache uv tools
        uses: actions/cache@v5
        with:
          path: |
            ~/.local/share/uv/tools
            ~/.local/bin
          key: uv-tools-${{ runner.os }}-bandit-pip-audit-v2

      - name: Install security tools
        run: |
          uv tool install pip-audit
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run Bandit (Static Analysis)
        env:
          BANDIT_TARGET: ${{ inputs.bandit-target }}
          BANDIT_SEVERITY: ${{ inputs.bandit-severity }}
        run: |
          case "$BANDIT_SEVERITY" in
            -l|-ll|-lll) ;;
            *) echo "Invalid bandit-severity: $BANDIT_SEVERITY" && exit 1 ;;
          esac
          uvx bandit -r "$BANDIT_TARGET" "$BANDIT_SEVERITY" -x tests

      - name: Compile dependency lockfile
        if: inputs.pip-audit-enabled
        run: |
          uv pip compile pyproject.toml -o /tmp/requirements-lock.txt 2>/dev/null || true

      - name: Run Dependency Audit
        if: inputs.pip-audit-enabled
        continue-on-error: true
        run: |
          if [ -f /tmp/requirements-lock.txt ]; then
            pip-audit -r /tmp/requirements-lock.txt
          elif [ -f requirements.txt ]; then
            pip-audit -r requirements.txt
          else
            echo "No dependency file found, skipping audit."
          fi

      - name: Run Bandit with SARIF output
        if: inputs.upload-sarif
        continue-on-error: true
        env:
          BANDIT_TARGET: ${{ inputs.bandit-target }}
          BANDIT_SEVERITY: ${{ inputs.bandit-severity }}
        run: |
          uvx bandit -r "$BANDIT_TARGET" "$BANDIT_SEVERITY" -x tests -f sarif -o bandit-results.sarif 2>/dev/null || true

      - name: Upload Bandit SARIF to Code Scanning
        if: inputs.upload-sarif && hashFiles('bandit-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit-results.sarif
          category: bandit

      - name: Run pip-audit with JSON output
        if: inputs.pip-audit-enabled
        id: audit
        continue-on-error: true
        run: |
          AUDIT_EXIT=0
          if [ -f /tmp/requirements-lock.txt ]; then
            pip-audit -r /tmp/requirements-lock.txt -f json -o audit-results.json 2>/dev/null || AUDIT_EXIT=$?
          elif [ -f requirements.txt ]; then
            pip-audit -r requirements.txt -f json -o audit-results.json 2>/dev/null || AUDIT_EXIT=$?
          fi
          echo "exit_code=$AUDIT_EXIT" >> "$GITHUB_OUTPUT"

          # Generate summary
          if [ -f audit-results.json ]; then
            VULN_COUNT=$(python3 -c "import json; data=json.load(open('audit-results.json')); print(len([d for d in data.get('dependencies', []) if d.get('vulns', [])]))" 2>/dev/null || echo "0")
            echo "vuln_count=$VULN_COUNT" >> "$GITHUB_OUTPUT"
          else
            echo "vuln_count=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-reports
          path: |
            bandit-results.sarif
            audit-results.json
          retention-days: 30
          if-no-files-found: ignore

      - name: Create or Update Issue on vulnerability detection
        if: inputs.create-issue-on-vuln && always() && steps.audit.outputs.vuln_count != '0'
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.github-token || github.token }}
          script: |
            const vulnCount = parseInt('${{ steps.audit.outputs.vuln_count }}');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const today = new Date().toISOString().split('T')[0];

            // Check for existing open issue with security,automated labels
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'security,automated',
              state: 'open',
            });

            if (existingIssues.data.length > 0) {
              const existing = existingIssues.data[0];

              // Get last comment to check for duplicates
              const comments = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
              });

              const lastBotComment = comments.data.reverse().find(c => c.user.login === 'github-actions[bot]');

              // Only comment if count changed or last comment is old (to avoid spam)
              if (lastBotComment && lastBotComment.body.includes(`Vulnerabilities Detected | ${vulnCount}`)) {
                core.info(`Vulnerability count (${vulnCount}) hasn't changed since last report. Skipping comment.`);
                return;
              }

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `## 🔍 Security Scan Update (${today})\n\n| Item | Value |\n|------|-------|\n| Vulnerabilities Detected | **${vulnCount}** |\n| Status | Action still required |\n| Actions Run | [View Details](${runUrl}) |\n\n> Duplicate comments are suppressed when the same vulnerability count is detected.`,
              });
              core.info(`Updated existing issue #${existing.number} with new vulnerability data`);
              return;
            }

            // No open issue exists — create a new one
            const title = `🔒 Security Vulnerabilities Detected: ${vulnCount} (${today})`;

            let body = `## Automated Security Scan Results\n\n`;
            body += `| Item | Value |\n|------|-------|\n`;
            body += `| Vulnerabilities Detected | ${vulnCount} |\n`;
            body += `| Scan Time | ${new Date().toISOString()} |\n`;
            body += `| Actions Run | [Link](${runUrl}) |\n\n`;
            body += `### Action Required\n`;
            body += `1. Check detailed results from the Actions Run link\n`;
            body += `2. Download \`audit-results.json\` artifact and review vulnerability list\n`;
            body += `3. Update vulnerable packages and close this issue\n`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['security', 'automated'],
            });

      - name: Security Summary
        if: always()
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Bandit (Static Analysis) | ✅ Complete |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ inputs.upload-sarif }}" = "true" ]; then
            echo "| SARIF Upload | ✅ Code Scanning |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ inputs.pip-audit-enabled }}" = "true" ]; then
            echo "| pip-audit (Dependencies) | ${{ steps.audit.outputs.vuln_count }} vulnerabilities |" >> $GITHUB_STEP_SUMMARY
            if [ "${{ steps.audit.outputs.vuln_count }}" != "0" ]; then
              echo "| Auto Issue Created | ✅ |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| Auto Issue Created | ⏭️ (no vulnerabilities) |" >> $GITHUB_STEP_SUMMARY
            fi
          fi
