name: Reusable Test

on:
  workflow_call:
    inputs:
      python-versions:
        description: 'JSON array of Python versions'
        required: false
        type: string
        default: '["3.10", "3.11"]'
      os-list:
        description: 'JSON array of OS'
        required: false
        type: string
        default: '["ubuntu-latest"]'
      coverage-threshold:
        description: 'Minimum coverage percentage'
        required: false
        type: number
        default: 80
      matrix-include:
        description: |
          JSON array for matrix include entries (overrides python-versions x os-list when provided).
          Example: '[{"python-version":"3.10","os":"ubuntu-latest"},{"python-version":"3.11","os":"ubuntu-latest"}]'
        required: false
        type: string
        default: ''
    secrets:
      CODECOV_TOKEN:
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # matrix-include가 제공된 경우 placeholder 값으로 기본 축을 채우고
        # exclude로 placeholder 조합을 제거한 뒤 include로만 실제 조합을 구성한다.
        # 이는 GitHub Actions에서 동적으로 matrix를 완전히 override하는 관용적 패턴이다.
        python-version: ${{ inputs.matrix-include == '' && fromJSON(inputs.python-versions) || fromJSON('["placeholder"]') }}
        os: ${{ inputs.matrix-include == '' && fromJSON(inputs.os-list) || fromJSON('["placeholder"]') }}
        include: ${{ inputs.matrix-include != '' && fromJSON(inputs.matrix-include) || fromJSON('[]') }}
        exclude: ${{ inputs.matrix-include != '' && fromJSON('[{"python-version":"placeholder","os":"placeholder"}]') || fromJSON('[]') }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python with uv
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ matrix.python-version }}
          extras: '--extra dev --extra inference --extra database'

      - name: Run PR-safe inference suite
        run: bash .github/scripts/run_inference_ci.sh ${{ inputs.coverage-threshold }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          fail_ci_if_error: false

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.os }}-py${{ matrix.python-version }}
          path: ./coverage.xml
          retention-days: 7
