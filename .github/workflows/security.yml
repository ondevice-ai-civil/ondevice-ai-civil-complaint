name: Security Scan

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'assets/**'
      - 'LICENSE'
      - 'CODE_OF_CONDUCT.md'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'assets/**'
      - 'LICENSE'
      - 'CODE_OF_CONDUCT.md'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
  schedule:
    - cron: '0 0 * * 1'

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  security:
    uses: ./.github/workflows/reusable-security-scan.yml
    with:
      bandit-target: src
      bandit-severity: '-lll'
      pip-audit-enabled: true
      upload-sarif: true
      create-issue-on-vuln: true
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
