name: "Train EXAONE-Deep-7.8B on GPU"

on:
  workflow_dispatch:
    inputs:
      epochs:
        description: 'Number of training epochs'
        required: true
        default: '1'
      batch_size:
        description: 'Per device train batch size'
        required: true
        default: '1'
      push_to_hub:
        description: 'Push final model to HF Hub'
        type: boolean
        default: true
      hub_model_id:
        description: 'HF Model ID'
        required: false
        default: 'GovOn/EXAONE-Deep-7.8B-Gov-v2'

jobs:
  train:
    runs-on: ubuntu-22.04-gpu-t4
    
    env:
      DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
      WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_HUB_ENABLE_HF_TRANSFER: 1
      PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Install and Pull Git LFS
        run: |
          sudo apt-get update
          sudo apt-get install -y git-lfs
          git lfs install
          git lfs pull

      - name: Setup Python with uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.10"
          enable-cache: true

      - name: Install Dependencies (Safe & High-speed with uv)
        run: |
          # 1) 제약 조건 파일(constraints.txt)을 사용하여 Torch 버전 강제 고정
          # 어떤 패키지가 Torch를 요구하더라도 2.4.0만 사용하도록 강제함
          uv pip install torch==2.4.0 torchvision==0.19.0 torchaudio==2.4.0 --index-url https://download.pytorch.org/whl/cu121 -c src/training/constraints.txt
          
          # 2) 나머지 학습 라이브러리 설치 (제약 조건 유지)
          uv pip install bitsandbytes==0.43.3 accelerate==0.34.2 peft==0.12.0 trl==0.9.6 transformers==4.44.2 datasets wandb requests loguru -c src/training/constraints.txt
          
          # 3) 프로젝트 설치 (제약 조건 유지)
          uv pip install -e . --no-deps

      - name: Prepare Integrated Dataset (Civil + Public Doc)
        run: |
          mkdir -p data/final
          uv run --no-sync python scripts/collect_data/collect_public_docs.py --limit 3000 --output data/raw/public_docs.jsonl
          TRAIN_CIVIL="data/processed/civil_complaint_train.jsonl"
          
          # 데이터 최적화: 공문서 5,000건 샘플링 및 민원 20,000건 병합
          uv run --no-sync python -c "
          import json, random, os
          combined = []
          # 1. 공문서 데이터 샘플링
          try:
              with open('data/raw/public_docs.jsonl', 'r') as f:
                  pub_data = [json.loads(line) for line in f]
                  sampled_pub = random.sample(pub_data, min(len(pub_data), 5000))
                  combined.extend(sampled_pub)
                  print(f'Sampled Public Docs: {len(sampled_pub)}')
          except Exception as e:
              print(f'Error sampling public docs: {e}')
          
          # 2. 기존 민원 데이터 샘플링
          if os.path.exists('$TRAIN_CIVIL'):
              with open('$TRAIN_CIVIL', 'r') as f:
                  civil_data = [json.loads(line) for line in f]
                  sampled_civil = random.sample(civil_data, min(len(civil_data), 20000))
                  combined.extend(sampled_civil)
                  print(f'Sampled Civil Docs: {len(sampled_civil)}')
          
          random.shuffle(combined)
          
          # 최종 분할 저장
          split = int(len(combined) * 0.9)
          with open('data/final/train.jsonl', 'w') as f:
              for item in combined[:split]: f.write(json.dumps(item, ensure_ascii=False) + '\n')
          with open('data/final/val.jsonl', 'w') as f:
              for item in combined[split:]: f.write(json.dumps(item, ensure_ascii=False) + '\n')
          
          print(f'Final optimized dataset size for T4: {len(combined)}')
          "

      - name: Fine-tuning EXAONE-Deep-7.8B (QLoRA for T4)
        run: |
          uv run --no-sync python src/training/train_qlora.py \
            --model_id "LGAI-EXAONE/EXAONE-Deep-7.8B" \
            --train_path "data/final/train.jsonl" \
            --val_path "data/final/val.jsonl" \
            --output_dir "./models/checkpoints/exaone-gov-v2" \
            --epochs 1 \
            --batch_size 1 \
            --grad_accum 32 \
            --max_seq_length 1024 \
            ${{ github.event.inputs.push_to_hub == 'true' && '--push_to_hub' || '' }} \
            --hub_model_id "${{ github.event.inputs.hub_model_id }}" \
            --hf_token "${{ env.HF_TOKEN }}"

      - name: Upload Logs to W&B
        if: always()
        run: |
          if command -v wandb &> /dev/null; then
            uv run --no-sync wandb sync --clean
          fi
