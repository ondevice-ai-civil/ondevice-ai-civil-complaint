name: Weekly Summary

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  issues: read
  pull-requests: read

jobs:
  weekly-summary:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Generate weekly summary
        run: |
          set -euo pipefail

          WEEK_AGO=$(date -u -d '7 days ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -u -v-7d +%Y-%m-%dT%H:%M:%SZ)
          REPO="${{ github.repository }}"

          echo "## GovOn Weekly Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### Merged PRs" >> "$GITHUB_STEP_SUMMARY"
          echo "| PR | Title | Author | Merged At |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|---|---|" >> "$GITHUB_STEP_SUMMARY"
          gh pr list --repo "$REPO" --state merged --base main --limit 100 \
            --json number,title,author,mergedAt \
            --jq --arg cutoff "$WEEK_AGO" \
            '.[] | select(.mergedAt >= $cutoff) | "| #\(.number) | \(.title) | @\(.author.login) | \(.mergedAt[:10]) |"' \
            >> "$GITHUB_STEP_SUMMARY" || true
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### Issue Status" >> "$GITHUB_STEP_SUMMARY"
          NEW_ISSUES=$(gh issue list --repo "$REPO" --state all \
            --search "created:>=${WEEK_AGO}" --json number --jq 'length' || echo "0")
          CLOSED_ISSUES=$(gh issue list --repo "$REPO" --state closed \
            --search "closed:>=${WEEK_AGO}" --json number --jq 'length' || echo "0")
          echo "- New: **${NEW_ISSUES}** / Closed: **${CLOSED_ISSUES}**" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### PRs Awaiting Review" >> "$GITHUB_STEP_SUMMARY"
          echo "| PR | Title | Author |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|---|" >> "$GITHUB_STEP_SUMMARY"
          gh pr list --repo "$REPO" --state open --base main \
            --json number,title,author \
            --jq '.[] | "| #\(.number) | \(.title) | @\(.author.login) |"' \
            >> "$GITHUB_STEP_SUMMARY" || true
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### CI Health (Last 5 Runs)" >> "$GITHUB_STEP_SUMMARY"
          echo "| Run | Result | Date |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|---|" >> "$GITHUB_STEP_SUMMARY"
          gh run list --repo "$REPO" --workflow ci.yml --branch main \
            --limit 5 --json conclusion,displayTitle,createdAt \
            --jq '.[] | "| \(.displayTitle[:50] | gsub("\\|"; "\\|")) | \(.conclusion) | \(.createdAt[:10]) |"' \
            >> "$GITHUB_STEP_SUMMARY" || true
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### DORA Metrics" >> "$GITHUB_STEP_SUMMARY"
          echo "- [Grafana Dashboard](https://umyunsang.grafana.net/d/govon-dora/)" >> "$GITHUB_STEP_SUMMARY"
