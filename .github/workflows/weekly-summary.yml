name: Weekly Summary

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  issues: read
  pull-requests: read

jobs:
  weekly-summary:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate weekly summary
        run: |
          set -euo pipefail

          WEEK_AGO=$(date -u -d '7 days ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -u -v-7d +%Y-%m-%dT%H:%M:%SZ)
          REPO="${{ github.repository }}"

          echo "## GovOn 주간 요약" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### 머지된 PR" >> "$GITHUB_STEP_SUMMARY"
          echo "| PR | 제목 | 작성자 | 머지일 |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|---|---|" >> "$GITHUB_STEP_SUMMARY"
          gh pr list --repo "$REPO" --state merged --base main \
            --search "merged:>=${WEEK_AGO}" \
            --json number,title,author,mergedAt \
            --jq '.[] | "| #\(.number) | \(.title) | @\(.author.login) | \(.mergedAt[:10]) |"' \
            >> "$GITHUB_STEP_SUMMARY" || true
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### 이슈 현황" >> "$GITHUB_STEP_SUMMARY"
          NEW_ISSUES=$(gh issue list --repo "$REPO" --state all \
            --search "created:>=${WEEK_AGO}" --json number --jq 'length' || echo "0")
          CLOSED_ISSUES=$(gh issue list --repo "$REPO" --state closed \
            --search "closed:>=${WEEK_AGO}" --json number --jq 'length' || echo "0")
          echo "- 신규: **${NEW_ISSUES}건** / 종료: **${CLOSED_ISSUES}건**" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### 리뷰 대기 PR" >> "$GITHUB_STEP_SUMMARY"
          echo "| PR | 제목 | 작성자 |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|---|" >> "$GITHUB_STEP_SUMMARY"
          gh pr list --repo "$REPO" --state open --base main \
            --json number,title,author \
            --jq '.[] | "| #\(.number) | \(.title) | @\(.author.login) |"' \
            >> "$GITHUB_STEP_SUMMARY" || true
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### CI 건강도 (최근 5회)" >> "$GITHUB_STEP_SUMMARY"
          echo "| Run | 결과 | 날짜 |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|---|" >> "$GITHUB_STEP_SUMMARY"
          gh run list --repo "$REPO" --workflow ci.yml --branch main \
            --limit 5 --json conclusion,displayTitle,createdAt \
            --jq '.[] | "| \(.displayTitle[:50]) | \(.conclusion) | \(.createdAt[:10]) |"' \
            >> "$GITHUB_STEP_SUMMARY" || true
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### DORA 메트릭" >> "$GITHUB_STEP_SUMMARY"
          echo "- [Grafana Dashboard](https://umyunsang.grafana.net/d/govon-dora/)" >> "$GITHUB_STEP_SUMMARY"
