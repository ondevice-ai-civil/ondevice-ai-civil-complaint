adapters:
  public_admin:
    path: "umyunsang/govon-civil-adapter"
    description: "Public administration complaint draft generation. Trained on 74K complaint-response pairs."
    domain: "public_admin"
    keywords:
      - complaint
      - administration
      - permit
      - application
      - objection
    tool_description: >
      Generate a draft response for public administration complaints using a specialized
      LoRA model trained on 74K complaint-response pairs. USE THIS TOOL for queries about
      administrative procedures, permits, applications, objections, or general civil service
      matters. DO NOT use for legal interpretation queries.
      Returns: JSON with "text" (draft response) and "success" (boolean).
    requires_approval: true
  legal:
    path: "siwo/govon-legal-adapter"
    description: "Legal draft generation with statute citations. Trained on 270K legal documents."
    domain: "legal"
    keywords:
      - law
      - statute
      - precedent
      - ordinance
      - decree
    tool_description: >
      Generate a draft response with legal citations using a specialized LoRA model trained
      on 270K legal documents. USE THIS TOOL for queries requiring legal interpretation,
      statute references, court precedents, ordinances, or enforcement decrees.
      DO NOT use for general administrative complaints.
      Returns: JSON with "text" (draft response) and "success" (boolean).
    requires_approval: true
