# GovOn AX (Agentic Transformation) Adapter Architecture
# ---------------------------------------------------------------------------
# Each adapter wraps a government agency API endpoint as a callable LLM tool.
# The central LLM orchestrates these adapters via tool calls, enabling
# cross-agency data synthesis through a single unified interface.
#
# MVP (v1): 2 domain adapters active
# Roadmap: 16 national domain adapters planned
#   공공행정 (active), 법률 (active),
#   과학기술, 교육, 교통물류, 국토관리, 농축수산, 문화관광,
#   보건의료, 사회복지, 산업고용, 식품건강, 재난안전, 재정금융,
#   통일외교안보, 환경기상
# ---------------------------------------------------------------------------
adapters:
  public_admin:
    path: "umyunsang/govon-civil-adapter"
    description: "Public administration domain adapter. Trained on 74K central/local government agency QA pairs (AI Hub 71852) and administrative law QA (AI Hub 71847). Handles civil complaints, permits, applications, objections, and administrative procedures."
    domain: "public_admin"
    keywords:
      - complaint
      - administration
      - permit
      - application
      - objection
    tool_description: >
      Generate responses for public administration complaints using a specialized LoRA model
      trained on 74K government agency complaint-response pairs (AI Hub 71852: central/local
      government QA) and administrative law QA (AI Hub 71847). USE THIS TOOL for queries about
      administrative procedures, permits, applications, objections, civil service complaints,
      or administrative decisions. DO NOT use for legal interpretation queries requiring
      specific statute citations from civil, criminal, or IP law.
      Returns: JSON with "text" (draft response) and "success" (boolean).
    requires_approval: true
  legal:
    path: "siwo/govon-legal-adapter"
    description: "Legal domain adapter. Trained on 270K legal documents — court precedents, civil law QA (AI Hub 71841), IP law QA (AI Hub 71843), and criminal law QA (AI Hub 71848). Handles statute interpretation, legal citations, precedent references, and enforcement decrees."
    domain: "legal"
    keywords:
      - law
      - statute
      - precedent
      - ordinance
      - decree
    tool_description: >
      Generate responses with statute citations for legal questions using a specialized LoRA
      model trained on 270K legal documents (court precedents, AI Hub 71841 civil law,
      71843 IP law, 71848 criminal law QA). USE THIS TOOL for queries requiring legal
      interpretation, statute references, court precedents, ordinances, or enforcement decrees.
      DO NOT use for general administrative complaints.
      Returns: JSON with "text" (draft response) and "success" (boolean).
    requires_approval: true
